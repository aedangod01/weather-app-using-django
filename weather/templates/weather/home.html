<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل هواشناسی تاریک</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 min-h-screen flex flex-col items-center font-sans text-gray-100">

    <!-- بخش جستجو -->
   <header class="w-full py-6 bg-gray-800/90 shadow-lg relative flex justify-center items-center backdrop-blur-md">
    <!-- فرم جستجو همیشه وسط -->
    <form class="flex w-11/12 md:w-2/3 lg:w-1/2" action="" method="get">
        <input type="text" placeholder="نام شهر را وارد کنید..." name="city"
            class="flex-1 p-4 rounded-l-xl border border-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-800 text-gray-200 text-lg shadow-inner placeholder-gray-400">
        <button type="submit"
            class="p-4 bg-indigo-600 text-white rounded-r-xl font-semibold hover:bg-indigo-700 transition-all shadow-lg">
            جستجو
        </button>
    </form>

    <!-- آیکون گیت‌هاب سمت راست بالا -->
    <a href="https://github.com/aedangod01/" target="_blank"
        class="absolute right-6 top-1/2 transform -translate-y-1/2 hover:scale-110 transition-all">
        <svg class="w-8 h-8 text-gray-200 hover:text-white" fill="currentColor" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd"
                d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.26.82-.577v-2.23c-3.338.724-4.033-1.61-4.033-1.61-.546-1.385-1.333-1.753-1.333-1.753-1.09-.745.083-.73.083-.73 1.205.085 1.84 1.236 1.84 1.236 1.07 1.833 2.807 1.304 3.492.997.107-.774.418-1.304.76-1.604-2.665-.304-5.466-1.332-5.466-5.93 0-1.31.468-2.382 1.236-3.222-.124-.303-.536-1.524.117-3.176 0 0 1.008-.322 3.3 1.23a11.48 11.48 0 0 1 3-.403c1.02.005 2.045.137 3 .403 2.29-1.552 3.296-1.23 3.296-1.23.655 1.652.243 2.873.12 3.176.77.84 1.235 1.912 1.235 3.222 0 4.61-2.804 5.625-5.475 5.922.43.372.815 1.104.815 2.228v3.303c0 .32.216.694.825.576C20.565 21.796 24 17.3 24 12c0-6.63-5.373-12-12-12z" />
        </svg>
    </a>
</header>



    <!-- باکس بزرگ شهر -->
   <main class="flex justify-center items-center flex-1 w-full px-4 mt-12">
    
    {% if error %}
    <!-- پیام خطای شهر یا API -->
    <div class="w-full max-w-lg p-6 bg-red-600/20 text-red-400 border border-red-600 rounded-xl text-center font-semibold">
        {{ error }}
    </div>
    {% elif weather %}
    <!-- باکس بزرگ شهر -->
    <div
        class="relative bg-gray-800/90 rounded-3xl shadow-2xl p-10 max-w-lg w-full text-center backdrop-blur-sm hover:scale-105 transform transition-all duration-300">

        <!-- آیکون هوا با انیمیشن ملایم فقط روی آیکون -->
        <div
            class="text-8xl mb-6 bg-gradient-to-r from-yellow-400 via-yellow-300 to-red-400 bg-clip-text text-transparent animate-bounce-slow">
            ☀️
        </div>

        <!-- نام شهر و دما -->
        <h1 class="text-4xl font-bold mb-2">{{ weather.city }}</h1>
        <p class="text-3xl font-semibold mb-4">{{ weather.temperature }}°C</p>
        <p class="text-lg mb-8 text-gray-300">{{ weather.status }}</p>
        <div class="grid grid-cols-2 gap-4 text-gray-200 font-medium text-sm">
            <div
                class="bg-gray-700/70 p-4 rounded-xl flex flex-col items-center justify-center shadow-md hover:scale-105 transition-all">
                <span class="text-lg">💨</span>
                <span class="mt-1">باد: {{ weather.windspeed }}</span>
            </div>
            <div
                class="bg-gray-700/70 p-4 rounded-xl flex flex-col items-center justify-center shadow-md hover:scale-105 transition-all">
                <span class="text-lg">💧</span>
                <span class="mt-1">جهت باد: {{ weather.winddirection }}</span>
            </div>
            <div
                class="bg-gray-700/70 p-4 rounded-xl flex flex-col items-center justify-center shadow-md hover:scale-105 transition-all">
                <span class="text-lg">🌡</span>
                <span class="mt-1">فشار: {{ weather.pressure|default:"N/A" }}</span>
            </div>
            <div
                class="bg-gray-700/70 p-4 rounded-xl flex flex-col items-center justify-center shadow-md hover:scale-105 transition-all">
                <span class="text-lg">🌅</span>
                <span class="mt-1">طلوع: {{ weather.sunrise|default:"N/A" }}</span>
            </div>
        </div>

        <!-- افکت gradient ملایم در پشت کارت -->
        <div
            class="absolute inset-0 rounded-3xl bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 opacity-10 pointer-events-none">
        </div>
    </div>
    {% endif %}

</main>


    <!-- انیمیشن bounce ملایم فقط روی آیکون -->
    <style>
        @keyframes bounce-slow {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .animate-bounce-slow {
            animation: bounce-slow 2s ease-in-out infinite;
        }
    </style>

</body>

</html>
